name: Daily Sport Weather Bot

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 07:30 CET daily
  workflow_dispatch:         # Allow manual trigger from GitHub

jobs:
  sportweather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sport weather data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHERAPI_API_KEY: ${{ secrets.WEATHERAPI_API_KEY }}
        run: python scripts/sport_weather_fetch.py

      - name: Analyse and generate personal comments
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sport_analyzer.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sport weather data [skip ci]"
          file_pattern: "docs/*.json"

      - name: Send Telegram notifications and listen for button clicks
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/send_notification.py --push --listen=180
        # --listen=180: stays alive for 3 min to handle inline button clicks
        # Total step time: ~3.5 min (well within GitHub Actions free tier)
