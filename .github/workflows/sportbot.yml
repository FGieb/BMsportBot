name: Daily Sport Weather Bot

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 07:30 CET daily
  workflow_dispatch:         # Allow manual trigger from GitHub

jobs:
  sportweather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sport weather data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHERAPI_API_KEY: ${{ secrets.WEATHERAPI_API_KEY }}
        run: python scripts/sport_weather_fetch.py

      - name: Analyse and generate personal comments
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sport_analyzer.py

      - name: Commit and push results
        run: |
          set -e
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/*.json
          git commit -m "Update sport weather data [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Send Telegram notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/send_notification.py --push
