name: Daily Sport Weather Data Update

# This workflow fetches weather data and commits it to the repo.
# The always-on bot handles sending messages and user interactions.
# This serves as a backup data source and keeps the GitHub Pages site updated.

on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC = 07:30 CET daily
  workflow_dispatch:         # Allow manual trigger from GitHub

jobs:
  sportweather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sport weather data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          WEATHERAPI_API_KEY: ${{ secrets.WEATHERAPI_API_KEY }}
        run: python scripts/sport_weather_fetch.py

      - name: Analyse and generate personal comments
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/sport_analyzer.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update sport weather data [skip ci]"
          file_pattern: "docs/*.json"
